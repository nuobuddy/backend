services:
  app:
    build: .
    container_name: nuobuddy-backend
    restart: unless-stopped
    command: >-
      sh -c "if [ -f dist/scripts/migration-run.js ]; then node dist/scripts/migration-run.js;
      elif [ -f dist/migration-run.js ]; then node dist/migration-run.js;
      else echo 'Migration runner not found, skipping migrations.'; fi && node dist/main.js"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: '${DB_PORT:-5432}'
      DB_USERNAME: '${DB_USERNAME:-nuobuddy}'
      DB_PASSWORD: '${DB_PASSWORD:-nuobuddy}'
      DB_DATABASE: '${DB_DATABASE:-nuobuddy}'
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nuobuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nuobuddy
      POSTGRES_PASSWORD: nuobuddy
      POSTGRES_DB: nuobuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuobuddy -d nuobuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nuobuddy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
